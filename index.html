<script>
 


let id;
let movie_details = document.getElementById("query").value;

let movie_info = document.getElementById("movie");
  async function searchMovie(value){

   
try
{
    var data1 = "d806bd70"
    let url = `http://www.omdbapi.com/?s=${value}&apikey=${data1}`;
let res = await fetch(url);
let data = await res.json();
console.log(data);
return data.Search;

}
catch(error){
    console.log("error",error);

}

}

function append(movie){
movie_info.innerHTML = null;

    if(movie === undefined){
        return false;

    }
    console.log("movie:",movie)
    movie.forEach(function(elem){
        let  p = document.createElement("p");
        p.setAttribute("id","p1")
        p.innerText = elem.Title;
        var x = elem.Title
        p.addEventListener("click",function(x){
           
            movieshow(elem.Title);


        })
        movie_info.append(p);


    })
}


async function main(){
    let movie_details = document.getElementById("query").value;
    let response = searchMovie(movie_details);

    let data = await response;

    console.log("data",data);
    append(data);



}

//

function debounceFunction(func , delay){



if(id){
    clearTimeout(id);

}
 id = setTimeout(function(){
    func();

},delay);


}


async function movieshow(value){
    console.log("value",value)
try{
    var data1 = "2ddcb06c"
    let movie_details = document.getElementById("query").value;
    var url = `http://www.omdbapi.com/?t=${value}&apikey=${data1}`;
    let res = await fetch(url);
    let data = res.json();
   
    console.log("data",data)
showposter(data)
   


}
  
catch(error){
    console.log(error)
}
async function showposter(data){
    let movie_details = document.getElementById("query").value;
    let response = data;
    let output = await response;
    var arr = [];
arr.push(output)
   watchposter(arr)

}
 

function watchposter(arr){
    console.log("output",arr)
;
arr.forEach(function(elem){
    document.querySelector("section").innerHTML = null
    var div = document.createElement("div");
    div.setAttribute("id","div");

    var img = document.createElement("img");
    img.setAttribute("id","img")
    img.src = elem.Poster;
    var p1 = document.createElement("p");
    p1.setAttribute("class","font");

    p1.innerText ="Released:"+ elem.Released;
    var p2 = document.createElement("p");
    p2.setAttribute("class","font");

    p2.innerText ="ImdRating:"+ elem.imdbRating;
    var p3 = document.createElement("p");
    p3.setAttribute("class","font");

    p3.innerText ="Year:"+ elem.Year;
    var p4 = document.createElement("p");
    p4.setAttribute("class","font");

    p4.innerText ="Cast:"+ elem.Actors;


    div.append(img,p1,p2,p3,p4)
    document.querySelector("section").append(div);

    

})
}



}
</script>
